version: "2"
sql:
    - schema: "sql/schema"
      queries: "sql/queries"
      engine: "postgresql"
      gen:
          go:
              package: "database"
              sql_package: "pgx/v5"
              out: "internal/database"
              emit_pointers_for_null_types: true
              overrides:
                  - db_type: "uuid"
                    go_type:
                        import: "github.com/google/uuid"
                        type: "UUID"

                  - db_type: "timestamptz"
                    go_type:
                        import: "time"
                        type: "Time"

                  - db_type: "timestamp"
                    go_type:
                        import: "time"
                        type: "Time"
