openapi: 3.0.3
info:
  title: GoChat API
  description: REST API for GoChat application supporting authentication, user verification, and account management.
  version: 1.0.0
servers:
  - url: http://localhost:8080
    description: Local development server

paths:
  /api/healthz:
    get:
      summary: Health Check
      description: Returns the health status of the API server.
      responses:
        '200':
          description: Server is healthy
          content:
            text/plain:
              schema:
                type: string
                example: OK

  /api/users:
    post:
      summary: Create User
      description: Registers a new user account and sends a verification email.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserCreateResponse'
        '400':
          description: Bad request (invalid JSON or hashing failure)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict (email already exists)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      summary: Delete (Anonymize) User Account
      description: Deletes the authenticated user's refresh tokens and anonymizes their account.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Account deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Account deleted
        '401':
          description: Missing or invalid JWT access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden (user context missing)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/verify:
    post:
      summary: Verify User Account
      description: Verifies a newly registered user account using a verification token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
              properties:
                token:
                  type: string
                  description: Account verification token
                  example: 4a3f91c2...
      responses:
        '200':
          description: Account successfully verified
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Account successfully verified. You may now log in.
        '400':
          description: Missing or invalid parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Verification token is invalid or expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/login:
    post:
      summary: User Login
      description: Authenticates a user and returns a JWT access token along with a refresh token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserLoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Bad request (invalid JSON parameters)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized (incorrect credentials or account unverified)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/refresh:
    post:
      summary: Refresh Access Token
      description: Generates a new JWT access token using a valid Bearer refresh token.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Access token generated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: New JWT access token
        '400':
          description: Missing bearer token header
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/revoke:
    post:
      summary: Revoke Refresh Token
      description: Revokes a refresh token passed via the Authorization Bearer header.
      security:
        - BearerAuth: []
      responses:
        '204':
          description: Refresh token revoked successfully (No Content)
        '400':
          description: Missing or invalid refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Access token or refresh token passed in the Authorization header (Bearer <token>).

  schemas:
    UserCreateRequest:
      type: object
      required:
        - email
        - nickname
        - password
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        nickname:
          type: string
          example: johndoe
        password:
          type: string
          format: password
          example: secretPassword123!

    UserLoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          format: password
          example: secretPassword123!

    UserObject:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: 018f4a3e-7b1c-7123-8abc-123456789abc
        nickname:
          type: string
          example: johndoe
        status:
          type: string
          example: unverified
        email:
          type: string
          format: email
          example: user@example.com
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    UserCreateResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        nickname:
          type: string
        status:
          type: string
        email:
          type: string
          format: email
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    LoginResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        nickname:
          type: string
        status:
          type: string
        email:
          type: string
          format: email
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        token:
          type: string
          description: JWT access token
        refresh_token:
          type: string
          description: Raw refresh token string

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: Something went wrong
